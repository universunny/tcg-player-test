<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你是哪种牌佬？- TCG玩家类型测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            position: relative;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 40px;
            font-size: 36px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .intro-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .intro-text {
            margin-bottom: 30px;
        }

        .intro-text p {
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-start {
            font-size: 18px;
            padding: 18px 40px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .questions-container {
            margin-bottom: 40px;
        }

        .question-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .question-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .slider-container {
            margin-bottom: 40px;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        .slider::-moz-range-thumb:hover {
            transform: scale(1.1);
        }

        .slider-levels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 12px;
            color: #999;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn-prev, .btn-next {
            flex: 1;
            margin: 0 10px;
        }

        .result-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-container.active {
            display: block;
        }

        .result-title {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .player-type {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9ff 0%, #e9ecef 100%);
            border-radius: 15px;
        }

        .type-description {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-restart {
            display: block;
            margin: 0 auto;
            font-size: 16px;
            padding: 15px 30px;
        }

        .share-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .share-section p {
            color: #666;
            margin-bottom: 10px;
        }

        .share-input-group {
            display: flex;
            gap: 10px;
        }

        .share-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-copy {
            padding: 10px 20px;
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .question {
                font-size: 16px;
            }

            .buttons {
                flex-direction: column;
                gap: 10px;
            }

            .btn-prev, .btn-next {
                margin: 0;
            }

            .dimension-scores {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="pageTitle">你是哪种牌佬？</h1>

        <div class="intro-container" id="introContainer">
            <button class="btn btn-start" onclick="startAssessment()">开始测试</button>
            <div class="share-section">
                <p>分享测试链接：</p>
                <div class="share-input-group">
                    <input type="text" id="shareLink" class="share-input" readonly>
                    <button class="btn btn-copy" onclick="copyShareLink()">复制</button>
                </div>
            </div>
        </div>

        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="questions-container" id="questionsContainer"></div>

        <div class="result-container" id="resultContainer">
            <h2 class="result-title">测试结果</h2>
            <div class="player-type" id="playerType"></div>
            <div class="type-description" id="typeDescription"></div>
            <button class="btn btn-restart" onclick="restartAssessment()">重新测试</button>
        </div>
    </div>

    <script>
        const dimensions = {
            yingHaoShengLiZhe: {
                name: "英豪胜利者",
                items: [1, 2, 3, 4, 5],
                reverseItems: [],
                description: "你是一个追求胜利的玩家，对游戏的胜负非常看重，总是希望使用最强的卡组，在比赛中力争上游。",
                advice: "适当放松心态，享受游戏的乐趣，不要让胜负影响你的心情。偶尔尝试一些娱乐卡组，可能会给你带来新的体验。"
            },
            daFaMingJia: {
                name: "大发明家",
                items: [6, 7, 8, 9, 10],
                reverseItems: [6],
                description: "你是一个富有创造力的玩家，喜欢开发新颖的卡组和战术，享受构建和实验的过程。",
                advice: "继续发挥你的创造力，同时也可以学习一些主流卡组的思路，将创新与实用结合起来。"
            },
            yuLeHuoBan: {
                name: "娱乐伙伴",
                items: [11, 12, 13, 14, 15],
                reverseItems: [],
                description: "你是一个享受游戏过程的玩家，更看重与朋友的互动和游戏的乐趣，胜负对你来说并不是最重要的。",
                advice: "保持这种良好的心态，游戏的本质就是娱乐，你的态度值得赞赏。"
            },
            shouCangJia: {
                name: "收藏家",
                items: [16, 17, 18, 19, 20],
                reverseItems: [],
                description: "你是一个热爱卡牌本身的玩家，看重卡牌的收藏价值、美术设计和背景故事，可能拥有丰富的收藏。",
                advice: "继续享受收藏的乐趣，同时也可以尝试参与一些实际的对局，将收藏与游戏结合起来。"
            },
            kaPianShangRen: {
                name: "卡片商人",
                items: [21, 22, 23, 24, 25],
                reverseItems: [],
                description: "你是一个关注卡牌市场价值的玩家，善于抓住市场机会进行交易，将卡牌视为一种投资工具。",
                advice: "投资有风险，入市需谨慎。在追求经济利益的同时，也不要忘记游戏的本质乐趣。"
            }
        };

        const questions = [
            // 英豪胜利者
            { id: 1, text: "大多数时候用主流卡组进行对战。", dimension: "yingHaoShengLiZhe", reverse: false },
            { id: 2, text: "认为卡牌最重要的属性是强度。", dimension: "yingHaoShengLiZhe", reverse: false },
            { id: 3, text: "比赛目的就是获取优胜或上位。", dimension: "yingHaoShengLiZhe", reverse: false },
            { id: 4, text: "输掉比赛会郁闷很久。", dimension: "yingHaoShengLiZhe", reverse: false },
            { id: 5, text: "对局结束，尤其是输掉之后会复盘半天。", dimension: "yingHaoShengLiZhe", reverse: false },
            
            // 大发明家
            { id: 6, text: "不爱照抄别人的成熟构筑。", dimension: "daFaMingJia", reverse: false },
            { id: 7, text: "在卡组塞入\"冷门科技\"。", dimension: "daFaMingJia", reverse: false },
            { id: 8, text: "构筑带有强烈且神秘的个人色彩。", dimension: "daFaMingJia", reverse: false },
            { id: 9, text: "开发有创意且实用的构筑。", dimension: "daFaMingJia", reverse: false },
            { id: 10, text: "总能打出一些奇妙combo。", dimension: "daFaMingJia", reverse: false },
            
            // 娱乐伙伴
            { id: 11, text: "享受打牌的过程。", dimension: "yuLeHuoBan", reverse: false },
            { id: 12, text: "常与牌友约娱乐局。", dimension: "yuLeHuoBan", reverse: false },
            { id: 13, text: "通过打牌来社交或打发时间。", dimension: "yuLeHuoBan", reverse: false },
            { id: 14, text: "再硬的终场也要尝试突破一下。", dimension: "yuLeHuoBan", reverse: false },
            { id: 15, text: "认为不是只有胜利才能让你快乐。", dimension: "yuLeHuoBan", reverse: false },
            
            // 收藏家
            { id: 16, text: "喜欢收集高罕或特别版本的卡牌。", dimension: "shouCangJia", reverse: false },
            { id: 17, text: "卡牌的美术设计和背景故事对你很重要。", dimension: "shouCangJia", reverse: false },
            { id: 18, text: "购买没有强度但价格不菲的卡牌。", dimension: "shouCangJia", reverse: false },
            { id: 19, text: "卡本厚度堪比牛津词典，军火库能开一家卡店。", dimension: "shouCangJia", reverse: false },
            { id: 20, text: "关注卡牌的品相，重视卡牌保养。", dimension: "shouCangJia", reverse: false },
            
            // 卡片商人
            { id: 21, text: "根据市场价格变化买卖卡牌。", dimension: "kaPianShangRen", reverse: false },
            { id: 22, text: "情报一出，立马梭哈潜力老卡。", dimension: "kaPianShangRen", reverse: false },
            { id: 23, text: "将被淘汰的卡牌立即着手出掉。", dimension: "kaPianShangRen", reverse: false },
            { id: 24, text: "关注卡牌在经济方面的投资回报。", dimension: "kaPianShangRen", reverse: false },
            { id: 25, text: "用卡牌来赚钱。", dimension: "kaPianShangRen", reverse: false }
        ];

        let currentQuestion = 0;
        let answers = [];
        let shuffledQuestions = [];

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startAssessment() {
            document.getElementById('pageTitle').style.display = 'none';
            document.getElementById('introContainer').classList.add('hidden');
            document.getElementById('progressBar').style.display = 'block';
            
            shuffledQuestions = shuffleArray(questions);
            answers = new Array(shuffledQuestions.length).fill(50);
            
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            shuffledQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container';
                questionDiv.id = `question-${index}`;

                const questionText = document.createElement('div');
                questionText.className = 'question';
                questionText.textContent = q.text;

                const sliderContainer = document.createElement('div');
                sliderContainer.className = 'slider-container';
                
                const sliderLevels = document.createElement('div');
                sliderLevels.className = 'slider-levels';
                sliderLevels.innerHTML = '<span>完全不像我</span><span>有点像我</span><span>比较像我</span><span>完全就是我</span>';

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.className = 'slider';
                slider.min = '0';
                slider.max = '75';
                slider.value = '25';
                slider.step = '25';
                slider.oninput = function() {
                    answers[index] = parseInt(this.value);
                };

                sliderContainer.appendChild(slider);
                sliderContainer.appendChild(sliderLevels);

                const buttonsDiv = document.createElement('div');
                buttonsDiv.className = 'buttons';

                const prevBtn = document.createElement('button');
                prevBtn.className = 'btn btn-prev';
                prevBtn.textContent = '上一题';
                prevBtn.onclick = prevQuestion;
                if (index === 0) {
                    prevBtn.disabled = true;
                }

                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn btn-next';
                nextBtn.textContent = index === shuffledQuestions.length - 1 ? '提交' : '下一题';
                nextBtn.onclick = nextQuestion;

                buttonsDiv.appendChild(prevBtn);
                buttonsDiv.appendChild(nextBtn);

                questionDiv.appendChild(questionText);
                questionDiv.appendChild(sliderContainer);
                questionDiv.appendChild(buttonsDiv);
                container.appendChild(questionDiv);
            });

            showQuestion(0);
            updateProgress();
        }

        function showQuestion(index) {
            const containers = document.querySelectorAll('.question-container');
            containers.forEach(c => c.classList.remove('active'));
            document.getElementById(`question-${index}`).classList.add('active');

            containers.forEach((container, idx) => {
                const prevBtn = container.querySelector('.btn-prev');
                const nextBtn = container.querySelector('.btn-next');
                
                if (prevBtn) {
                    prevBtn.disabled = idx === 0;
                }
                
                if (nextBtn) {
                    nextBtn.textContent = idx === shuffledQuestions.length - 1 ? '提交' : '下一题';
                }
            });
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
                updateProgress();
            }
        }

        function nextQuestion() {
            if (currentQuestion < shuffledQuestions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
                updateProgress();
            } else {
                showResult();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / shuffledQuestions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function calculateScores() {
            const scores = {
                yingHaoShengLiZhe: 0,
                daFaMingJia: 0,
                yuLeHuoBan: 0,
                shouCangJia: 0,
                kaPianShangRen: 0
            };

            shuffledQuestions.forEach((q, index) => {
                let score = answers[index] || 25;
                // 将0-75映射到4点计分系统：0=0, 25=1, 50=2, 75=3
                let mappedScore = score / 25;
                if (q.reverse) {
                    mappedScore = 3 - mappedScore; // 反向计分
                }
                scores[q.dimension] += mappedScore;
            });

            return scores;
        }

        function showResult() {
            const scores = calculateScores();

            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';
            document.getElementById('resultContainer').classList.add('active');

            let maxScore = 0;
            let mainType = '';
            for (const [key, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    mainType = key;
                }
            }

            const playerType = document.getElementById('playerType');
            const typeDescription = document.getElementById('typeDescription');
            const adviceText = document.getElementById('adviceText');

            playerType.textContent = dimensions[mainType].name;
            typeDescription.textContent = dimensions[mainType].description;
        }

        function restartAssessment() {
            currentQuestion = 0;
            answers = [];

            document.getElementById('pageTitle').style.display = 'block';
            document.getElementById('resultContainer').classList.remove('active');
            document.getElementById('questionsContainer').style.display = 'block';
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('introContainer').classList.remove('hidden');

            shuffledQuestions = shuffleArray(questions);
            answers = new Array(shuffledQuestions.length).fill(50);
            renderQuestions();
        }

        function generateShareLink() {
            const baseUrl = window.location.href.split('?')[0];
            const testId = 'test_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            const shareUrl = baseUrl + '?test=' + testId;
            document.getElementById('shareLink').value = shareUrl;
        }

        function copyShareLink() {
            const shareLinkInput = document.getElementById('shareLink');
            shareLinkInput.select();
            document.execCommand('copy');
            alert('链接已复制到剪贴板！');
        }

        window.onload = function() {
            generateShareLink();
        };
    </script>
</body>
</html>
